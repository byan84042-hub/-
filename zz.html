<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقع مطعم السوداني</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#b30000,#1f7a1f);
    color:white;
    text-align:center;
}

/* العنوان */
header{
    padding:30px;
    background:rgba(0,0,0,0.6);
    border-bottom:3px solid gold;
}

header h1{
    margin:0;
    color:gold;
    font-size:32px;
}

/* القسم */
.location{
    padding:40px 20px;
}

.location h2{
    color:yellow;
    margin-bottom:15px;
}

.location p{
    font-size:18px;
    line-height:1.8;
    max-width:800px;
    margin:auto;
}

/* زر الموقع */
.map-btn{
    margin-top:30px;
}

.map-btn a{
    background:gold;
    color:black;
    padding:14px 28px;
    text-decoration:none;
    font-weight:bold;
    border-radius:10px;
    display:inline-block;
    transition:0.3s;
}

.map-btn a:hover{
    background:#ffd700;
    transform:scale(1.05);
}

/* زر الرجوع */
.back-btn{
    margin:40px 0;
}

.back-btn a{
    background:white;
    color:black;
    padding:12px 25px;
    text-decoration:none;
    font-weight:bold;
    border-radius:10px;
    display:inline-block;
    transition:0.3s;
}

.back-btn a:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<header>
    <h1>📍 موقع مطعم السوداني</h1>
</header>

<div class="location">

    <h2>زورونا الآن</h2>

    <p>
        مطعم السوداني يرحب بكم دائماً بأشهى الأطباق العربية والشرقية
        مع جلسات عائلية مميزة وأضخم صالة ألعاب أطفال مجانية داخل المطعم.
    </p>

    <!-- زر فتح الموقع -->
    <div class="map-btn">
        <a href="https://www.google.com/maps/place/%D9%85%D8%B7%D8%B9%D9%85+%D8%A7%D9%84%D8%B3%D9%88%D8%AF%D8%A7%D9%86%D9%8A%E2%80%AD/@32.0621292,36.0968491,17z/data=!3m1!4b1!4m6!3m5!1s0x151b6fa4da4a2dbf:0xf81ebfaea2f7a470!8m2!3d32.0621292!4d36.0968491!16s%2Fg%2F11vj77k2fq?entry=ttu&g_ep=EgoyMDI2MDUxMy4wIKXMDSoASAFQAw%3D%3D" target="_blank">
            فتح الموقع على الخريطة
        </a>
    </div>

</div>

<!-- زر الرجوع -->
<div class="back-btn">
    <a href="mn.html">رجوع</a>
</div>

</body>
</html>
