<!DOCTYPE html>

<meta charset="UTF-8">

<title>100 صورة</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

h1{
    text-align:center;
    color:gold;
    padding:20px;
}

/* شبكة الصور */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));
    gap:10px;
    padding:20px;
}

.gallery img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:10px;
    border:2px solid gold;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.08);
}

/* الأزرار */
.buttons{
    text-align:center;
    margin:40px 0;
}

.buttons a{
    background:gold;
    color:black;
    padding:12px 25px;
    text-decoration:none;
    font-weight:bold;
    border-radius:10px;
    display:inline-block;
    margin:5px;
    transition:0.3s;
}

.buttons a:hover{
    background:#ffd700;
    transform:scale(1.05);
}
</style>

</head>
